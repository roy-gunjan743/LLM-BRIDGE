<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Bridge — Memory Graph</title>
  <meta name="description" content="Interactive knowledge graph of your LLM Bridge memory — explore nodes, relationships, and decisions." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b12;
      --surface:   #0e1220;
      --surface2:  #13182a;
      --border:    #1c2238;
      --border2:   #252d46;
      --text:      #e2e8ff;
      --muted:     #4a5278;
      --accent:    #6c7fff;
      --accent2:   #a78bfa;

      --c-project:  #f5c842;
      --c-tech:     #a78bfa;
      --c-goal:     #34d399;
      --c-task:     #60a5fa;
      --c-decision: #fb923c;
      --c-issue:    #f87171;
      --c-next:     #22d3ee;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ───────────────────────────────────────────── */
    #toolbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-right: 8px;
    }

    .logo-mark {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: #d4ff4e;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 11px; color: #111;
    }

    .logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
    .logo-sub  { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    .divider-v {
      width: 1px; height: 28px;
      background: var(--border);
      flex: 0 0 auto;
    }

    #searchWrap {
      position: relative;
      flex: 0 0 240px;
    }

    #searchWrap svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 8px 12px 8px 32px;
      outline: none;
      transition: border-color .15s;
    }

    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    /* ── Filter pills ──────────────────────────────────────── */
    #filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      transition: all .15s;
      user-select: none;
      font-family: 'JetBrains Mono', monospace;
    }

    .pill:hover { color: var(--text); border-color: var(--accent); }

    .pill.active { color: var(--text); }

    .pill-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    /* ── Toolbar right ─────────────────────────────────────── */
    .tb-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #graphStats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tb-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .tb-btn:hover { color: var(--text); border-color: var(--accent); }

    .tb-btn.accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .tb-btn.accent:hover { background: #5a6eee; }

    /* ── Canvas ────────────────────────────────────────────── */
    #main {
      flex: 1 1 auto;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    #cy {
      flex: 1 1 auto;
      height: 100%;
      background: var(--bg);
    }

    /* ── Empty state ───────────────────────────────────────── */
    #emptyState {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
    }

    #emptyState svg { color: var(--border2); }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--muted);
    }

    .empty-sub {
      font-size: 13px;
      color: #2a3050;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
      max-width: 340px;
      line-height: 1.7;
    }

    /* ── Detail panel ──────────────────────────────────────── */
    #panel {
      width: 300px;
      flex: 0 0 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(300px);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
      z-index: 5;
    }

    #panel.open { transform: translateX(0); }

    .panel-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 6px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      word-break: break-word;
    }

    .panel-close {
      width: 28px; height: 28px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
      transition: all .12s;
    }

    .panel-close:hover { color: var(--text); border-color: var(--border2); }

    .panel-body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px 18px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .panel-section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
      margin-top: 18px;
    }

    .panel-section-label:first-child { margin-top: 0; }

    .panel-desc {
      font-size: 12.5px;
      color: #8a95c0;
      line-height: 1.7;
      font-family: 'JetBrains Mono', monospace;
    }

    .connection-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .12s;
    }

    .connection-item:hover { border-color: var(--accent); }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .conn-label {
      font-size: 11px;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conn-rel {
      font-size: 9px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    /* ── Legend ────────────────────────────────────────────── */
    #legend {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      overflow-x: auto;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .leg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    /* ── Loading overlay ───────────────────────────────────── */
    #loadingOverlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 20;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Tooltip ───────────────────────────────────────────── */
    #tooltip {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      pointer-events: none;
      z-index: 100;
      display: none;
      max-width: 220px;
      line-height: 1.5;
    }

    /* ── Scrollbar global ──────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
  <div id="toolbar">
    <div class="logo">
      <div class="logo-mark">LB</div>
      <div>
        <div class="logo-text">LLM Bridge</div>
        <div class="logo-sub">memory graph</div>
      </div>
    </div>

    <div class="divider-v"></div>

    <div id="searchWrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="search nodes…" autocomplete="off" />
    </div>

    <div id="filters">
      <div class="pill active" data-type="project"  style="border-color:var(--c-project)30"><span class="pill-dot" style="background:var(--c-project)"></span>project</div>
      <div class="pill active" data-type="technology" style="border-color:var(--c-tech)30"><span class="pill-dot" style="background:var(--c-tech)"></span>tech</div>
      <div class="pill active" data-type="goal"     style="border-color:var(--c-goal)30"><span class="pill-dot" style="background:var(--c-goal)"></span>goal</div>
      <div class="pill active" data-type="task"     style="border-color:var(--c-task)30"><span class="pill-dot" style="background:var(--c-task)"></span>task</div>
      <div class="pill active" data-type="decision" style="border-color:var(--c-decision)30"><span class="pill-dot" style="background:var(--c-decision)"></span>decision</div>
      <div class="pill active" data-type="issue"    style="border-color:var(--c-issue)30"><span class="pill-dot" style="background:var(--c-issue)"></span>issue</div>
      <div class="pill active" data-type="next_step" style="border-color:var(--c-next)30"><span class="pill-dot" style="background:var(--c-next)"></span>next</div>
    </div>

    <div class="tb-right">
      <span id="graphStats"></span>
      <button class="tb-btn" id="fitBtn" title="Fit graph to screen">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        fit
      </button>
      <button class="tb-btn" id="relayoutBtn" title="Re-run layout">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        re-layout
      </button>
      <button class="tb-btn accent" id="exportBtn" title="Download graph as JSON">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        export
      </button>
    </div>
  </div>

  <!-- ── Main ─────────────────────────────────────────────────────────────── -->
  <div id="main">
    <!-- Cytoscape canvas -->
    <div id="cy"></div>

    <!-- Empty state -->
    <div id="emptyState" style="display:none">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      <div class="empty-title">No graph yet</div>
      <div class="empty-sub">Import a chat and run <strong>Summarize</strong> in the LLM Bridge popup to build your memory graph.</div>
    </div>

    <!-- Detail panel -->
    <div id="panel">
      <div class="panel-header">
        <div style="flex:1;min-width:0">
          <div id="panelBadge" class="panel-type-badge"></div>
          <div id="panelTitle" class="panel-title"></div>
        </div>
        <button class="panel-close" id="panelClose" aria-label="Close panel">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-label">loading memory graph…</div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip"></div>
  </div>

  <!-- ── Legend ────────────────────────────────────────────────────────────── -->
  <div id="legend">
    <span style="font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px">legend</span>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-project)"></div>Project</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-tech)"></div>Technology</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-goal)"></div>Goal</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-task)"></div>Task</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-decision)"></div>Decision</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-issue)"></div>Issue</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-next)"></div>Next Step</div>
  </div>

  <!-- Cytoscape.js from CDN -->
  <script src="cytoscape.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
