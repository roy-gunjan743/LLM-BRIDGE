<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LLM Bridge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 420px;
      min-height: 560px;
      background: #181818;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eeeeee;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid #2d2d2d;
      background: #222222;
    }
    .mark {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #d9edbf;
      display: grid;
      place-items: center;
      color: #315f0e;
      font-weight: 800;
    }
    h1 { font-size: 15px; line-height: 1.2; }
    .subtitle { font-size: 11px; color: #8f8f8f; margin-top: 2px; }
    .ollama-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #9a9a9a;
      font-size: 11px;
      white-space: nowrap;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #68ad2b;
      box-shadow: 0 0 6px rgba(104, 173, 43, 0.5);
    }
    .status-dot.error { background: #df5757; box-shadow: 0 0 6px rgba(223, 87, 87, 0.5); }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }
    .btn-row { display: flex; gap: 8px; }
    .btn {
      min-height: 38px;
      border: 1px solid #3b3b3b;
      border-radius: 8px;
      background: #282828;
      color: #e4e4e4;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 12px;
      transition: background 0.16s, border-color 0.16s, opacity 0.16s;
    }
    .btn svg { width: 15px; height: 15px; flex: 0 0 auto; }
    .btn.primary { background: #3f7417; border-color: #549423; color: #e1f5c8; }
    .btn.icon { width: 38px; padding: 0; flex: 0 0 auto; }
    .btn.flex { flex: 1; }
    .btn:hover:not(:disabled) { background: #333333; border-color: #595959; }
    .btn.primary:hover:not(:disabled) { background: #4b861d; }
    .btn:disabled { opacity: 0.42; cursor: not-allowed; }
    .btn.loading { opacity: 0.62; }
    .stats-row { display: none; gap: 6px; }
    .stat-pill {
      flex: 1;
      border: 1px solid #303030;
      background: #232323;
      border-radius: 8px;
      padding: 7px 8px;
      text-align: center;
    }
    .stat-pill .val { font-size: 15px; font-weight: 700; color: #cdeaaa; line-height: 1; }
    .stat-pill .lbl { font-size: 10px; color: #777777; margin-top: 4px; }
    .progress-wrap { display: none; }
    .progress-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .progress-label { color: #9b9b9b; font-size: 11.5px; max-width: 310px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .progress-pct { color: #cdeaaa; font-size: 11.5px; font-weight: 700; }
    .progress-track { width: 100%; height: 5px; background: #2d2d2d; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #579326, #a4d96c); transition: width 0.25s; }
    .chunk-dots { display: flex; flex-wrap: wrap; gap: 4px; min-height: 10px; margin-top: 8px; }
    .chunk-dot { width: 6px; height: 6px; border-radius: 50%; background: #416b20; opacity: 0.35; }
    .chunk-dot.done { opacity: 1; background: #9ad25b; }
    .chunk-dot.active { opacity: 1; background: #ffffff; }
    .banner {
      display: none;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.4;
    }
    .banner.error { background: rgba(223, 87, 87, 0.12); border: 1px solid rgba(223, 87, 87, 0.35); color: #ff9b9b; }
    .banner.success { background: rgba(104, 173, 43, 0.12); border: 1px solid rgba(104, 173, 43, 0.35); color: #cdeaaa; }
    .summary-wrap { position: relative; }
    #summaryBox {
      width: 100%;
      height: 238px;
      resize: none;
      background: #222222;
      border: 1px solid #303030;
      border-radius: 8px;
      padding: 12px;
      color: #dddddd;
      font: 13px/1.55 inherit;
      outline: none;
    }
    #summaryBox::placeholder { color: #666666; }
    .export-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .footer {
      padding: 9px 16px;
      border-top: 1px solid #2d2d2d;
      display: flex;
      justify-content: space-between;
      color: #666666;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="mark">LB</div>
    <div>
      <h1>LLM Bridge</h1>
      <div class="subtitle">Local summaries with persisted memory</div>
    </div>
    <div class="ollama-status">
      <span class="status-dot" id="ollamaDot"></span>
      <span id="ollamaLabel">Checking...</span>
    </div>
  </div>

  <div class="body">
    <div class="btn-row">
      <button class="btn flex" id="importBtn" type="button" title="Import visible chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>
        Import
      </button>
      <button class="btn primary flex" id="summarizeBtn" type="button" disabled title="Summarize imported chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="m17 5-5-3-5 3"/><path d="m17 19-5 3-5-3"/><path d="M2 12h20"/></svg>
        Summarize
      </button>
      <button class="btn icon" id="optionsBtn" type="button" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9c.3.6.9 1 1.6 1h.1a2 2 0 1 1 0 4H21a1.7 1.7 0 0 0-1.6 1Z"/></svg>
      </button>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-pill"><div class="val" id="statMsgs">-</div><div class="lbl">messages</div></div>
      <div class="stat-pill"><div class="val" id="statChunks">-</div><div class="lbl">chunks</div></div>
      <div class="stat-pill"><div class="val" id="statChars">-</div><div class="lbl">characters</div></div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-meta">
        <span class="progress-label" id="progressLabel">Ready</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="chunk-dots" id="chunkDots"></div>
    </div>

    <div class="banner error" id="errorBar"></div>
    <div class="banner success" id="successBar"></div>

    <div class="summary-wrap">
      <textarea id="summaryBox" placeholder="Summary preview will appear here..." readonly></textarea>
    </div>

    <div class="export-row">
      <button class="btn" id="copyBtn" type="button" disabled>Copy</button>
      <button class="btn" id="downloadTxtBtn" type="button" disabled>TXT</button>
      <button class="btn" id="downloadMdBtn" type="button" disabled>Markdown</button>
    </div>
  </div>

  <div class="footer">
    <span id="footerStatus">Ready</span>
    <span id="modelLabel">v2.1</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
